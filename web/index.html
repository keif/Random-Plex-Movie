<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plex Random Movie</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="plex-status" title="">
        <span id="plex-status-dot"></span>
        <span>Plex</span>
    </div>

    <main>
        <div id="loading-overlay">
            <div class="spinner"></div>
        </div>

        <div id="error-state" class="hidden">
            <p id="error-message"></p>
        </div>

        <section id="section" class="hidden">
            <div class="movie_container">
                <div class="movie_poster">
                    <img src="" alt="" id="poster_img">
                </div>
                <div class="movie_details">
                    <p id="title"></p>
                    <p id="year_duration"></p>
                    <p id="genres"></p>
                    <p id="rating"></p>
                    <p id="summary"></p>
                    <p id="directors"></p>
                    <p id="writers"></p>
                    <p id="actors"></p>
                </div>
            </div>

            <div class="button_container">
                <button id="btn_watch" class="button">WATCH</button>
                <button id="btn_next" class="button">NEXT</button>
            </div>

            <div id="filter_toggle_bar">
                <button id="btn_filters">FILTERS</button>
            </div>

            <div id="filter_panel" class="hidden">
                <div class="filter_row">
                    <label for="filter_genre">Genre</label>
                    <select id="filter_genre"><option value="">Any</option></select>
                </div>
                <div class="filter_row">
                    <label>Year</label>
                    <div class="filter_year_range">
                        <input type="number" id="filter_year_min" placeholder="From" min="1900" max="2100">
                        <span class="filter_sep">–</span>
                        <input type="number" id="filter_year_max" placeholder="To" min="1900" max="2100">
                    </div>
                </div>
                <div class="filter_row">
                    <label for="filter_rating_min">Min rating</label>
                    <input type="number" id="filter_rating_min" placeholder="0 – 10" min="0" max="10" step="0.5">
                </div>
                <div class="filter_row">
                    <label>&nbsp;</label>
                    <button id="btn_clear_filters">CLEAR</button>
                </div>
            </div>

            <div id="img_background"></div>
        </section>

        <div id="client_prompt" class="hidden">
            <div id="client_prompt_close" onclick="closeClientPrompt()">
                <svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 24 24">
                    <path d="M24 20.188l-8.315-8.209 8.2-8.282-3.697-3.697-8.212 8.318-8.31-8.203-3.666 3.666 8.321 8.24-8.206 8.313 3.666 3.666 8.237-8.318 8.285 8.203z"/>
                </svg>
            </div>
            <div id="container_list_of_clients">
                <div id="list_of_clients"></div>
            </div>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
